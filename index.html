<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>RECODE | Neural Data Universe</title>
    <style>
        :root { --bg: #050505; --accent: #00ff41; --font: 'Courier New', monospace; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--accent); font-family: var(--font); overflow: hidden; }

 /* [NEW] 로딩 화면: 터미널 스타일 */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center;
            padding: 10vw; font-size: 14px; line-height: 1.6;
        }
        .loading-cursor { display: inline-block; width: 10px; height: 18px; background: var(--accent); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
         
        /* 배경에 깔리는 매트릭스 코드 효과 */
        #bg-terminal {
            position: fixed; inset: 0; opacity: 0.1; font-size: 10px; pointer-events: none;
            overflow: hidden; line-height: 1.2; z-index: 0;
        }

        #viewport {
            width: 100vw; height: 100vh; perspective: 1000px;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }

        #world {
            position: absolute; transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
        }

        /* 데이터 노드: 올려주신 이미지처럼 텍스트가 겹친 느낌 */
        .node {
            position: absolute; padding: 5px;
            background: rgba(0, 255, 65, 0.05);
            border-left: 2px solid var(--accent);
            font-size: 11px; white-space: nowrap;
            transition: all 1.5s cubic-bezier(0.2, 0, 0, 1);
            cursor: pointer; transform-style: preserve-3d;
        }
        .node:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

        /* 연결선: 데이터 줄기세포 */
        .stem {
            position: absolute; background: var(--accent); opacity: 0.15;
            transform-origin: left center; height: 0.5px; pointer-events: none;
        }

        /* USB 초기 입구 */
        #usb-gate {
            position: absolute; width: 400px; height: 160px;
            border: 2px solid var(--accent); display: flex;
            align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; cursor: pointer;
            background: rgba(0,0,0,0.9); z-index: 500;
            box-shadow: 0 0 20px rgba(0,255,65,0.2);
        }
        body.entered #usb-gate { opacity: 0; pointer-events: none; transform: scale(2) translateZ(500px); }
    </style>
</head>
<body>

    <div id="bg-terminal"></div>

    <div id="viewport">
        <div id="usb-gate">[ CONNECT_TO_USB_CORE ]</div>
        <div id="world"></div>
    </div>

    <script>
        const world = document.getElementById('world');
        const bg = document.getElementById('bg-terminal');
        const nodeCount = 150;
        const nodes = [];

        // 1. 배경 코드 노이즈 생성
        for(let i=0; i<100; i++) {
            bg.innerHTML += "DATA_STREAM_" + Math.random().toString(16).slice(2, 10) + " RECODE_SYSTEM_v1.0.5_DEPLOYED...<br>";
        }

        // 2. 노드 생성 (USB 형태의 초기 배치 -> 이후 구 형태로 확산)
        for (let i = 0; i < nodeCount; i++) {
            const node = document.createElement('div');
            node.className = 'node';
            node.innerHTML = `> ARCHIVE_DATA_${i.toString().padStart(3, '0')}<br><small>REL_ID: ${Math.random().toString(36).substr(2, 5)}</small>`;
            
            // 초기 위치 (USB 격자 모양)
            const ix = (i % 15 * 25) - 180;
            const iy = (Math.floor(i / 15) * 15) - 75;
            
            node.style.transform = `translate3d(${ix}px, ${iy}px, 0px)`;
            world.appendChild(node);
            nodes.push({el: node, ix, iy});
        }

        // 3. 진입 시 "구(Sphere) 형태"로 질서 있게 확산
        document.getElementById('usb-gate').onclick = () => {
            document.body.classList.add('entered');
            
            nodes.forEach((n, i) => {
                const phi = Math.acos(-1 + (2 * i) / nodeCount);
                const theta = Math.sqrt(nodeCount * Math.PI) * phi;
                const radius = 900;

                const x = radius * Math.cos(theta) * Math.sin(phi);
                const y = radius * Math.sin(theta) * Math.sin(phi);
                const z = radius * Math.cos(phi) - 1000;

                n.el.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            });
        };

        // 4. 마우스 이동 및 스크롤로 유영
        let zoom = 0;
        window.addEventListener('wheel', (e) => {
            if(document.body.classList.contains('entered')) {
                zoom -= e.deltaY * 0.8;
                world.style.transform = `translateZ(${zoom}px) rotateX(${zoom * 0.01}deg)`;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if(document.body.classList.contains('entered')) {
                const rx = (e.clientX / window.innerWidth - 0.5) * 40;
                const ry = (e.clientY / window.innerHeight - 0.5) * 40;
                world.style.transform = `translateZ(${zoom}px) rotateY(${rx}deg) rotateX(${-ry}deg)`;
            }
        });
    </script>
</body>
</html>
